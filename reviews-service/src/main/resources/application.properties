spring.application.name=REVIEWS-SERVICE
server.port=${REVIEWS_SERVICE_PORT:8089}

spring.datasource.url=${REVIEWS_DB_URL:jdbc:postgresql://localhost:5432/reviewsdb}
spring.datasource.username=${REVIEWS_DB_USERNAME:postgres}
spring.datasource.password=${REVIEWS_DB_PASSWORD:slk@SOFT123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ? FIX
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false

security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
