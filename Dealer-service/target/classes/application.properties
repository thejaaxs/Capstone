spring.application.name=DEALER-SERVICE
server.port=${DEALER_SERVICE_PORT:8082}

spring.datasource.url=${DEALER_DB_URL:jdbc:postgresql://localhost:5432/dealerdb}
spring.datasource.username=${DEALER_DB_USERNAME:postgres}
spring.datasource.password=${DEALER_DB_PASSWORD:slk@SOFT123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ? FIX
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false

logging.level.org.springframework=INFO
security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
