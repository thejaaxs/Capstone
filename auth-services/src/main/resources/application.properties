# ===============================
# APPLICATION
# ===============================
spring.application.name=LOGIN-SERVICE
server.port=${LOGIN_SERVICE_PORT:8088}

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=${LOGIN_DB_URL:jdbc:postgresql://localhost:5432/logindb}
spring.datasource.username=${LOGIN_DB_USERNAME:postgres}
spring.datasource.password=${LOGIN_DB_PASSWORD:slk@SOFT123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO

# ===============================
# ACTUATOR (optional but useful)
# ===============================
management.endpoints.web.exposure.include=${LOGIN_ACTUATOR_EXPOSURE:*}

app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}

eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false
