<section class="page-card page-shell">
  <article class="card">
    <h2>Create Customer</h2>
    <form (ngSubmit)="submit()" #f="ngForm">
      <label for="customerName">Name</label>
      <input id="customerName" name="customerName" [(ngModel)]="model.customerName" required />

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" [(ngModel)]="model.address" required></textarea>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="model.email" required />

      <label for="contactNumber">Contact Number</label>
      <input id="contactNumber" name="contactNumber" [(ngModel)]="model.contactNumber" required />

      <button class="btn" type="submit" [disabled]="f.invalid || saving">
        {{ saving ? 'Creating...' : 'Create Customer' }}
      </button>
    </form>
  </article>
</section>
