spring.application.name=PAYMENT
server.port=${PAYMENT_SERVICE_PORT:8087}

spring.datasource.url=${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/paymentdb}
spring.datasource.username=${PAYMENT_DB_USERNAME:postgres}
spring.datasource.password=${PAYMENT_DB_PASSWORD:slk@SOFT123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}

payment.currency=${PAYMENT_CURRENCY:INR}
payment.mock-fallback=${PAYMENT_MOCK_FALLBACK:true}
payment.max-amount-in-paise=${PAYMENT_MAX_AMOUNT_IN_PAISE:1000000000}
payment.razorpay-order-cap-in-paise=${PAYMENT_RAZORPAY_ORDER_CAP_IN_PAISE:10000}
security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
