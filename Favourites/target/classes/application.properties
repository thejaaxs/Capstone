spring.application.name=FAVOURITES
server.port=${FAVOURITES_SERVICE_PORT:8081}

spring.datasource.url=${FAVOURITES_DB_URL:jdbc:postgresql://localhost:5432/favoritesdb}
spring.datasource.username=${FAVOURITES_DB_USERNAME:postgres}
spring.datasource.password=${FAVOURITES_DB_PASSWORD:slk@SOFT123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ? FIX
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false

security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
