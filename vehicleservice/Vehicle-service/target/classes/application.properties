spring.application.name=VEHICLE-SERVICE
server.port=${VEHICLE_SERVICE_PORT:8085}

spring.datasource.url=${VEHICLE_DB_URL:jdbc:postgresql://localhost:5432/vehicledb}
spring.datasource.username=${VEHICLE_DB_USERNAME:postgres}
spring.datasource.password=${VEHICLE_DB_PASSWORD:slk@SOFT123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ? FIX
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false

file.upload-dir=${VEHICLE_UPLOAD_DIR:uploads/}
spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
