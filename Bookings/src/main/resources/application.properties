
# =========================
# APPLICATION
# =========================
spring.application.name=BOOKING
server.port=${BOOKING_SERVICE_PORT:8086}

# =========================
# DATABASE CONFIG
# =========================
spring.datasource.url=${BOOKING_DB_URL:jdbc:postgresql://localhost:5432/bookingdb}
spring.datasource.username=${BOOKING_DB_USERNAME:postgres}
spring.datasource.password=${BOOKING_DB_PASSWORD:slk@SOFT123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# =========================
# EUREKA CLIENT CONFIG
# =========================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=false

security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-change-this-jwt-secret-key-123456}
logging.level.org.springframework=INFO
